<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KepinganBarang — Katalog Afiliasi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ HEADER PROFIL ░░ -->
  <header class="profile-header">
    <div class="profile-bg">
      <img src="images/background_header.jpg" alt="Background" />
      <div class="profile-bg-overlay"></div>
    </div>
    <div class="profile-content">
      <div class="profile-avatar-wrap">
        <img
          class="profile-avatar"
          src="images/fotoprofil.jpg"
          alt="Avatar KepinganBarang"
        />
      </div>
      <h1 class="profile-name">H. <span>OUTFIT</span></h1>
      <p class="profile-bio">Kurasi produk terbaik — dipilih dengan teliti, harga yang masuk akal.</p>
      <div class="profile-stats">
        <div class="stat"><span class="stat-num">48</span><span class="stat-label">Produk</span></div>
        <div class="stat-divider"></div>
        <div class="stat"><span class="stat-num">12</span><span class="stat-label">Kategori</span></div>
        <div class="stat-divider"></div>
      </div>
    </div>
  </header>

  <!-- ░░ SEARCH BAR ░░ -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Cari produk..." />
    </div>
  </div>

  <!-- ░░ NAVIGASI KATEGORI ░░ -->
  <nav class="category-nav" role="navigation" aria-label="Filter kategori">
    <div class="category-track">
      <button class="cat-btn active" data-category="semua">Semua</button>
      <button class="cat-btn active" data-category="baju">Baju</button>
    </div>
  </nav>

  <!-- ░░ GRID PRODUK ░░ -->
  <main class="product-section">
    <p class="result-count"><span id="count-display">12</span> produk ditemukan</p>
    <div class="product-grid" id="product-grid">

      <!-- PRODUK 1 -->
      <article class="product-card" data-category="baju">
        <div class="card-image-wrap">
          <img src="images/produk1.jpg" alt="Tshirt Cotton Pria" loading="lazy" />
          <span class="card-badge">Terlaris</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">Tshirt Cotton Pria</h3>
          <p class="card-price">Produk No.001</p>
          <a href="https://s.shopee.co.id/7AZ7tDDFvm" class="btn-buy" target="_blank" rel="noopener">Beli Sekarang →</a>
        </div>
      </article>

      <!-- PRODUK 2 -->
      <article class="product-card" data-category="baju">
        <div class="card-image-wrap">
          <img src="images/produk2.png" alt="CHOIZE STREETWEAR CLUB JERSEY OVERSIZE" loading="lazy" />
          <span class="card-badge">Terlaris</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">STREETWEAR CLUB JERSEY OVERSIZE</h3>
          <p class="card-price">Produk No.002</p>
          <a href="https://s.shopee.co.id/2LTwGe0vRJ" class="btn-buy" target="_blank" rel="noopener">Beli Sekarang →</a>
        </div>
      </article>

    </div><!-- /product-grid -->
  </main>

  <!-- ░░ FOOTER ░░ -->
  <footer class="site-footer">
    <p>© 2025 <strong>H.OUTFIT</strong>
  </footer>

  <script src="script.js"></script>
</body>
</html>
